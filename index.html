<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會談後快速記錄</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: #f7f5f2;
  color: #2c2a28;
  line-height: 1.65;
  font-size: 16px;
}
.wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
h1 { font-size: 20px; margin: 4px 0 2px; }
.sub { color: #8a8378; font-size: 13px; margin-bottom: 14px; }
.tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.tab {
  flex: 1; padding: 10px 6px; border: none; border-radius: 10px;
  background: #ebe7e0; color: #6b655c; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: .15s; white-space: nowrap;
}
.tab.active { background: #b08968; color: #fff; }
@media (max-width: 420px) { .tab { font-size: 13px; padding: 10px 2px; } }
.filter-bar { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
.filter-bar .fl { font-size: 13px; color: #8a7c68; font-weight: 600; flex-shrink: 0; }
.filter-bar select { flex: 1; width: auto; }
.insight-item { font-size: 14px; margin-bottom: 7px; }
.insight-item .qctx { display: inline; margin-left: 6px; }
/* progress bars (ICF 時數破關) */
.pb-row { margin-bottom: 13px; }
.pb-row:last-of-type { margin-bottom: 2px; }
.pb-head { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; margin-bottom: 5px; }
.pb-name { font-weight: 600; color: #6b655c; }
.pb-val { color: #a07d55; font-weight: 700; font-variant-numeric: tabular-nums; }
.pb-val .done-tag { color: #5a9e5f; font-size: 12px; }
.pb-track { height: 10px; background: #f0ece5; border-radius: 6px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,.04); }
.pb-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #c9a27e, #b08968); transition: width .7s cubic-bezier(.22,.9,.35,1); }
.pb-fill.done { background: linear-gradient(90deg, #7ab07f, #5a9e5f); }
.pb-note { color: #a39b8e; font-size: 12px; margin-top: 8px; }
/* mentor pack */
.mentor-pre {
  background: #faf6f0; border: 1px solid #eadfce; border-radius: 10px;
  padding: 12px 14px; font-size: 13px; line-height: 1.65; color: #3a352f;
  white-space: pre-wrap; word-break: break-word; max-height: 42vh; overflow-y: auto;
  font-family: inherit; margin: 4px 0 0;
}
/* reflect report */
.reflect-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
.pchip { border: 1px solid #e3d6c2; background: #fff; color: #8a7c68; border-radius: 14px; padding: 3px 11px; font-size: 12px; cursor: pointer; }
.pchip.on { background: #b08968; color: #fff; border-color: #b08968; }
.reflect-scores { display: flex; gap: 10px; margin: 12px 0 4px; }
.reflect-score { flex: 1; background: #faf6f0; border: 1px solid #eadfce; border-radius: 10px; padding: 10px 4px; text-align: center; }
.reflect-score .rs-num { font-size: 22px; font-weight: 700; color: #b08968; }
.reflect-score .rs-name { font-size: 12px; color: #8a8378; margin-top: 2px; }
.reflect-line { font-size: 14px; margin: 12px 0 0; line-height: 1.7; }
.reflect-line b { color: #966b43; }
.energy-tag { display: inline-block; border-radius: 6px; padding: 1px 8px; font-size: 12px; font-weight: 700; margin-right: 6px; }
.energy-good { background: #eaf3ea; color: #4d8752; }
.energy-mid  { background: #f4efe8; color: #a07d55; }
.energy-low  { background: #fbeee2; color: #a4693c; }
.card {
  background: #fff; border-radius: 14px; padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05); margin-bottom: 14px;
}
label { display: block; font-weight: 600; margin: 12px 0 5px; font-size: 14px; }
label .hint { font-weight: 400; color: #a39b8e; font-size: 12px; }
.privacy-tip { margin-top: 6px; background: #fbeee2; border: 1px solid #eadaca; border-radius: 8px; padding: 7px 10px; font-size: 12px; color: #a4693c; line-height: 1.5; }
input[type=text], input[type=date], textarea, select {
  width: 100%; padding: 10px 12px; border: 1px solid #e0dbd2; border-radius: 9px;
  font-size: 16px; font-family: inherit; background: #fdfcfa; color: #2c2a28;
}
input[type=date] { -webkit-appearance: none; appearance: none; text-align: left; min-height: 42px; }
textarea { resize: vertical; min-height: 46px; }
.row { display: flex; gap: 10px; }
.row > div { flex: 1; min-width: 0; }
@media (max-width: 480px) { .row { flex-direction: column; gap: 0; } }
.score-wrap { display: flex; align-items: center; gap: 12px; }
.score-wrap input[type=range] { flex: 1; accent-color: #b08968; }
.score-val {
  min-width: 42px; text-align: center; font-weight: 700; font-size: 17px;
  color: #b08968; background: #f4efe8; border-radius: 8px; padding: 3px 0;
}
.multi-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
.multi-item textarea { flex: 1; }
.mini-btn {
  border: none; background: #f0ece5; color: #8a8378; border-radius: 8px;
  width: 34px; min-height: 40px; font-size: 18px; cursor: pointer; flex-shrink: 0;
}
.add-btn {
  border: 1px dashed #cdc5b8; background: transparent; color: #8a7c68;
  border-radius: 9px; padding: 8px; width: 100%; cursor: pointer; font-size: 14px; margin-top: 4px;
}
.acc-item {
  border: 1px solid #ece7de; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
}
.acc-head { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
.acc-head input { margin-top: 4px; width: 18px; height: 18px; accent-color: #b08968; flex-shrink: 0; }
.acc-title { font-weight: 600; font-size: 14px; }
.acc-desc { color: #9a9184; font-size: 12px; margin-top: 2px; }
.acc-item.checked { background: #f6f1ea; border-color: #d9c9b4; }
.acc-note { margin-top: 8px; display: none; }
.acc-item.checked .acc-note { display: block; }
.actions { display: flex; gap: 10px; margin-top: 6px; }
.btn {
  flex: 1; padding: 12px; border: none; border-radius: 11px; font-size: 15px;
  font-weight: 600; cursor: pointer;
}
.btn-primary { background: #b08968; color: #fff; }
.btn-ghost { background: #ebe7e0; color: #6b655c; }
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #2c2a28; color: #fff; padding: 10px 20px; border-radius: 20px;
  font-size: 14px; opacity: 0; pointer-events: none; transition: .3s; z-index: 50;
}
.toast.show { opacity: 1; }
/* history */
.rec {
  background: #fff; border-radius: 12px; padding: 13px 15px; margin-bottom: 10px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05); cursor: pointer;
}
.rec-top { display: flex; justify-content: space-between; align-items: baseline; }
.rec-client { font-weight: 700; font-size: 16px; }
.rec-date { color: #a39b8e; font-size: 13px; }
.rec-meta { color: #8a8378; font-size: 13px; margin-top: 3px; }
.badge { display: inline-block; background: #f4efe8; color: #a07d55; border-radius: 6px; padding: 1px 7px; font-size: 12px; margin-left: 6px; }
.empty { text-align: center; color: #a39b8e; padding: 40px 0; }
.detail-field { margin-bottom: 12px; }
.detail-label { font-weight: 700; font-size: 13px; color: #8a7c68; margin-bottom: 3px; }
.detail-val { white-space: pre-wrap; }
.detail-val ul { margin: 4px 0; padding-left: 20px; }
.score-lines {
  background: #faf6f0; border: 1px solid #eadfce; border-radius: 12px;
  padding: 13px 15px; margin: 12px 0 18px;
}
.score-line { font-size: 15px; margin-bottom: 6px; }
.score-line:last-child { margin-bottom: 0; }
.score-line b { color: #b08968; }
.because-note {
  margin: 8px 0 0 4px; padding: 4px 0 4px 11px; border-left: 3px solid #d9c9b0;
  color: #7a7266; font-size: 14px;
}
.because-note .bl { color: #a89478; font-weight: 700; }
.acc-sub { font-weight: 700; font-size: 13px; color: #6b655c; margin: 10px 0 5px; }
.acc-group { padding-left: 4px; }
.acc-detail { margin-bottom: 8px; }
.acc-detail-title { font-weight: 600; font-size: 14px; color: #2c2a28; }
.acc-mark { font-weight: 700; margin-right: 6px; font-family: monospace; }
.acc-detail-note { font-size: 13px; color: #9a9184; margin-top: 2px; padding-left: 22px; }
.acc-none { color: #b3ab9d; font-size: 14px; }
/* mentor questions */
.qcard { background:#fff; border:1px solid #ece7de; border-radius:12px; padding:12px 14px; margin-bottom:10px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.qcard.done { background:#f6f4ef; }
.qtext { font-weight:600; font-size:15px; white-space:pre-wrap; }
.qctx { color:#a39b8e; font-size:13px; margin-top:3px; }
.qans { margin-top:8px; min-height:44px; }
.qanswer { margin-top:8px; border-left:3px solid #cdbfa8; padding:5px 10px; font-size:14px; white-space:pre-wrap; }
.qanswer .alabel { display:block; color:#a89478; font-weight:700; font-size:12px; margin-bottom:2px; }
.qbtns { margin-top:9px; display:flex; gap:16px; }
.mini-link { background:none; border:none; color:#a07d55; font-size:13px; cursor:pointer; padding:0; font-weight:600; }
.mini-link.del-link { color:#c99; }
.mini-link:hover { text-decoration:underline; }
.ask-sub { font-weight:700; font-size:14px; color:#6b655c; margin:4px 0 8px; }
.hidden { display: none; }
/* phrase cheat sheet */
.phrase-card { background: #fbf7f0; border: 1px solid #eadfce; }
.phrase-head { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.phrase-head .arrow { color: #b08968; font-size: 13px; }
.phrase-body { margin-top: 10px; }
.phrase-body.collapsed { display: none; }
.chip {
  display: inline-flex; align-items: center; gap: 6px; background: #fff;
  border: 1px solid #e3d6c2; border-radius: 16px; padding: 5px 6px 5px 12px;
  margin: 4px 5px 0 0; font-size: 14px; cursor: pointer;
}
.chip:hover { background: #f6efe4; }
.chip .del { color: #c9beac; font-weight: 700; padding: 0 3px; }
.chip .del:hover { color: #c0392b; }
.phrase-add { display: flex; gap: 8px; margin-top: 10px; }
.phrase-add input { flex: 1; }
.phrase-add button { border: none; background: #b08968; color: #fff; border-radius: 8px; padding: 0 16px; font-size: 14px; cursor: pointer; }
/* chart */
.chart-box { width: 100%; }
/* auth */
.auth-box {
  max-width: 400px; margin: 7vh auto 0; background:#fff; border-radius:18px;
  padding:32px 26px 20px; text-align:center;
  box-shadow: 0 10px 40px rgba(176,137,104,.14), 0 1px 3px rgba(0,0,0,.05);
}
.auth-greet { font-size:15px; color:#a07d55; font-weight:600; margin-bottom:6px; }
.auth-box h2 { font-size:22px; margin:0 0 4px; letter-spacing:.5px; }
.auth-box .sub { margin-bottom:20px; }
.auth-msg { color:#b3541e; font-size:13px; min-height:18px; margin:8px 0 0; }
.btn { transition: transform .1s, box-shadow .15s; }
.btn:active { transform: scale(.98); }
.btn-primary { box-shadow: 0 3px 10px rgba(176,137,104,.3); }
.auth-hint { background:#fbeee2; border:1px solid #eadaca; border-radius:8px; padding:9px 11px; font-size:12px; color:#a4693c; line-height:1.6; margin-top:8px; }
.auth-hint b { color:#8a5a2e; }
.acct-bar { display:flex; justify-content:space-between; align-items:center; background:#f2ede5; border-radius:10px; padding:8px 12px; margin-bottom:14px; font-size:13px; color:#6b655c; }
.acct-bar button { border:none; background:none; color:#a07d55; font-weight:600; cursor:pointer; font-size:13px; }
/* footer + legal */
.footer { text-align:center; color:#a39b8e; font-size:12px; padding:22px 0 8px; }
.footer a { color:#a07d55; cursor:pointer; text-decoration:underline; }
#legal-modal { position:fixed; inset:0; background:rgba(44,42,40,.5); display:none; align-items:center; justify-content:center; padding:16px; z-index:100; }
#legal-modal.show { display:flex; }
.legal-box { background:#fff; border-radius:14px; max-width:640px; width:100%; max-height:82vh; overflow-y:auto; padding:24px 26px; position:relative; box-shadow:0 8px 30px rgba(0,0,0,.25); }
.legal-close { position:absolute; top:12px; right:14px; border:none; background:#f0ece5; color:#8a8378; width:34px; height:34px; border-radius:50%; font-size:20px; cursor:pointer; }
.legal-box h3 { color:#966b43; font-size:17px; margin:22px 0 8px; }
.legal-box h3:first-of-type { margin-top:6px; }
.legal-box h2 { font-size:20px; margin:0 0 2px; }
.legal-box .lp-sub { color:#8a8378; font-size:13px; margin-bottom:8px; }
.legal-box p { font-size:14px; line-height:1.7; color:#3a352f; margin:0 0 9px; }
.legal-box .lp-note { background:#fbeee2; border:1px solid #e4c4a4; border-radius:10px; padding:10px 12px; color:#8a5a2e; font-size:13px; line-height:1.6; margin-bottom:14px; }
.legal-box b { color:#2c2a28; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <h1>會談後快速記錄</h1>
  <div class="sub">會談結束了嗎？花 15 分鐘，陪自己回顧這一場。<span id="stats-line"></span></div>

  <div class="acct-bar hidden" id="acct-bar">
    <span id="acct-email"></span>
    <span><button onclick="openHelp()">使用說明</button>　<button onclick="doLogout()">登出</button></span>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabNew" onclick="showView('new')">新增紀錄</button>
    <button class="tab" id="tabHist" onclick="showView('hist')">歷史紀錄 <span id="cnt"></span></button>
    <button class="tab" id="tabClients" onclick="showView('clients')">客戶</button>
    <button class="tab" id="tabAsk" onclick="showView('ask')">導師提問 <span id="askCnt"></span></button>
  </div>

  <!-- ===== NEW / EDIT FORM ===== -->
  <div id="view-new">
    <div class="card">
      <div class="row">
        <div>
          <label>日期</label>
          <input type="date" id="f-date" onchange="autoSessionFill()">
        </div>
        <div>
          <label>會談次數</label>
          <input type="text" id="f-session" placeholder="第一次">
        </div>
        <div>
          <label>時長 <span class="hint">分鐘</span></label>
          <input type="text" id="f-mins" inputmode="numeric" placeholder="60">
        </div>
      </div>
      <label>客戶</label>
      <select id="f-client-sel" onchange="onClientSelChange()"></select>
      <div id="f-client-newbox" class="hidden">
        <input type="text" id="f-client-new" style="margin-top:8px" placeholder="新客戶代號，例：Tom、A 小姐">
        <label style="margin-top:8px">之前已談過幾次？ <span class="hint">用這工具之前已談的次數，第一次合作填 0</span></label>
        <input type="text" id="f-client-pre" inputmode="numeric" value="0" onchange="newClientPreChange()">
      </div>
      <div class="privacy-tip hidden" id="f-lastimprove" style="margin-top:8px"></div>
      <div class="privacy-tip">🔒 為保護客戶隱私，客戶一律使用代號，不要輸入真實姓名或可辨識的細節。</div>

      <label>馬上掉出來的問題 <span class="hint">會談後第一個浮現的念頭</span></label>
      <textarea id="f-instant" placeholder="例：我發現我在時間快結束時會有點慌張"></textarea>
    </div>

    <div class="card">
      <label>給我自己的表現打幾分 <span class="hint">0–10</span></label>
      <div class="score-wrap">
        <input type="range" id="f-perf" min="0" max="10" step="0.5" value="7"
               oninput="document.getElementById('perfVal').textContent=this.value">
        <span class="score-val" id="perfVal">7</span>
      </div>
      <label>我自己的感受 <span class="hint">0–10</span></label>
      <div class="score-wrap">
        <input type="range" id="f-feel" min="0" max="10" step="0.5" value="7"
               oninput="document.getElementById('feelVal').textContent=this.value">
        <span class="score-val" id="feelVal">7</span>
      </div>
      <label>我覺得客戶的感受 <span class="hint">0–10</span></label>
      <div class="score-wrap">
        <input type="range" id="f-clientfeel" min="0" max="10" step="0.5" value="7"
               oninput="document.getElementById('clientfeelVal').textContent=this.value">
        <span class="score-val" id="clientfeelVal">7</span>
      </div>
      <label>因為 <span class="hint">為什麼覺得客戶是這個感受</span></label>
      <textarea id="f-because" placeholder="例：客戶談到轉職時聲音變亮、身體往前傾"></textarea>
    </div>

    <div class="card">
      <label>我做得好的（舉出三個）</label>
      <div id="good-list"></div>
      <button class="add-btn" onclick="addItem('good-list')">＋ 再加一項</button>
    </div>

    <div class="card">
      <label>注意到客戶在哪個時刻受到啟發或頓悟？</label>
      <textarea id="f-insight" placeholder="描述那個時刻，或客戶當下的反應…"></textarea>
    </div>

    <div class="card">
      <label>我覺得我可以改進的部分</label>
      <div id="improve-list"></div>
      <button class="add-btn" onclick="addItem('improve-list')">＋ 再加一項</button>
    </div>

    <div class="card">
      <label>這次的特殊狀況</label>
      <div id="special-list"></div>
      <button class="add-btn" onclick="addItem('special-list')">＋ 再加一項</button>
    </div>

    <div class="card">
      <label>ICF 八大核心職能 Checklist <span class="hint">ACC 標記；只勾「說得出具體事例」的職能，並在備註寫下事例</span></label>
      <button class="btn btn-ghost" style="width:100%;margin:6px 0 12px;background:#fbeee2;color:#a4693c" onclick="openAccAnalyze()">🎯 用 AI 分析逐字稿，自動判斷職能到位</button>
      <div id="acc-list"></div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" onclick="confirmReset()">清空</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveRecord()">儲存紀錄</button>
    </div>
    <div style="height:24px"></div>
  </div>

  <!-- ===== HISTORY ===== -->
  <div id="view-hist" class="hidden">
    <div class="card filter-bar">
      <span class="fl">客戶篩選</span>
      <select id="hist-filter" onchange="onHistFilter()"></select>
    </div>
    <div class="card phrase-card">
      <div class="phrase-head" onclick="toggleInsight()">
        <label style="margin:0;cursor:pointer">洞察 <span class="hint">強項與待改進彙整</span></label>
        <span class="arrow" id="insight-arrow">展開 ▾</span>
      </div>
      <div class="phrase-body collapsed" id="insight-body"></div>
    </div>
    <div class="card" id="chart-card">
      <label style="margin-top:0">自評趨勢 <span class="hint">表現 vs 感受 <span id="chart-hint"></span></span></label>
      <div class="chart-box" id="trendChart"></div>
    </div>
    <div class="card" id="reflect-card" style="display:none">
      <div class="reflect-head">
        <label style="margin:0">教練反思統計</label>
        <span>
          <button class="pchip" data-d="7"  onclick="setReflectPeriod(7)">近 7 天</button>
          <button class="pchip" data-d="30" onclick="setReflectPeriod(30)">近 30 天</button>
          <button class="pchip" data-d="0"  onclick="setReflectPeriod(0)">全部</button>
        </span>
      </div>
      <div id="reflect-body"></div>
    </div>
    <div class="actions" style="margin-bottom:14px">
      <button class="btn btn-ghost" onclick="backupJSON()">備份全部（下載檔）</button>
      <button class="btn btn-ghost" onclick="document.getElementById('restoreFile').click()">還原備份</button>
      <input type="file" id="restoreFile" accept="application/json" class="hidden" onchange="restoreJSON(event)">
    </div>
    <div class="actions" style="margin:-6px 0 14px">
      <button class="btn btn-ghost" onclick="exportAllText()">匯出全部文字</button>
      <button class="btn btn-primary" onclick="exportPDF()">匯出 PDF</button>
    </div>
    <div class="actions" style="margin:-6px 0 14px">
      <button class="btn btn-primary" onclick="openMentorPack()">📦 生成導師督導包（去識別化）</button>
    </div>
    <div id="hist-list"></div>
  </div>

  <!-- ===== CLIENTS ===== -->
  <div id="view-clients" class="hidden">
    <div class="card" id="hours-card" style="display:none">
      <label style="margin-top:0">ICF ACC 時數破關 <span class="hint">認證申請門檻</span></label>
      <div id="hours-stats" style="margin-top:10px"></div>
      <button class="btn btn-ghost" style="width:100%;margin-top:10px" onclick="exportHoursCSV()">匯出時數表（CSV）</button>
    </div>
    <div class="card">
      <label style="margin-top:0">新增客戶 <span class="hint">一律使用代號</span></label>

<script>
/* ICF 八大核心職能（2025 版架構；分四領域：基礎、共創關係、有效溝通、培養學習與成長） */
const ACC = [
  ["1 · 提問和探詢", "保持教練角色：以提問與探詢著眼當下與未來；不做顧問（給指示）、不做治療（聚焦過去情緒）"],
  ["2 · 存在狀態", "being——教練一貫的存在方式：開放、好奇、以客戶為中心，相信客戶有自己的答案"],
  ["3 · 共創明確協議", "打約四題：想談什麼？想帶走什麼/如何知道達到了？為何重要？遇到什麼阻礙？全程跟隨客戶議程"],
  ["4 · 信任和安全感", "當下承認並肯定客戶的洞察與學習；探索其情感、觀點與信念；關心客戶這個人，而非只有問題"],
  ["5 · 臨在狀態", "全程保持好奇；承認客戶提出的情境；允許客戶引導對話方向，在對話與沉默中為反思創造空間"],
  ["6 · 積極聆聽", "用摘要與轉述確認理解；提出觀察幫客戶建立新聯想；聽語氣、能量、情緒與肢體的多層次訊息"],
  ["7 · 啟發式探詢", "用提問、探索、沉默支持新覺察與轉換觀點（例外、奇蹟問句、GROW）；避免引導式或帶預設答案的提問"],
  ["8 · 促進客戶成長", "與客戶共同把覺察化為具體行動與可衡量成果；承認進展、支持客戶結束會談；不強加行動"]
];
const KEY = "coachingLogs_v1";
let editId = null;      // record being edited (null = new)
let currentId = null;   // record shown in detail
let detailFrom = 'hist';        // where detail view was opened from ('hist' | 'client')
let lastAutoSession = '';       // last auto-filled session value (only overwrite our own value)
let currentClientId = null;     // client shown in client detail
let histFilter = '';            // history view: filter by clientId ('' = all)

function load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e){ return []; } }
function store(a) { localStorage.setItem(KEY, JSON.stringify(a)); schedulePush(); }
const QKEY = "coachingQuestions_v1";
function loadQ() { try { return JSON.parse(localStorage.getItem(QKEY)) || []; } catch(e){ return []; } }
function storeQ(a) { localStorage.setItem(QKEY, JSON.stringify(a)); schedulePush(); }
const CKEY = "coachingClients_v1";
function loadC() { try { return JSON.parse(localStorage.getItem(CKEY)) || []; } catch(e){ return []; } }
function storeC(a) { localStorage.setItem(CKEY, JSON.stringify(a)); schedulePush(); }
const DKEY = "coachingDeleted_v1";   // 刪除墓碑：避免另一台裝置把已刪的資料「復活」
const SKEY = "coachingSyncedAt_v1";  // 上次看到的雲端 updated_at
function loadDel(){ try { const d = JSON.parse(localStorage.getItem(DKEY)); return (d && d.r) ? d : {r:[],q:[],c:[]}; } catch(e){ return {r:[],q:[],c:[]}; } }
function storeDel(d){ localStorage.setItem(DKEY, JSON.stringify(d)); }
function markDeleted(kind, id){ const d = loadDel(); if (!d[kind].includes(id)) { d[kind].push(id); storeDel(d); } }
/* 把雲端資料併進本機：id 聯集、本機優先、排除墓碑 */
function mergeCloud(p){
  const del = loadDel();
  if (p.deleted) { ['r','q','c'].forEach(k=>{ (p.deleted[k]||[]).forEach(id=>{ if (!del[k].includes(id)) del[k].push(id); }); }); storeDel(del); }
  const mergeArr = (localArr, cloudArr, delList) => {
    const ids = new Set(localArr.map(x=>x.id));
    (cloudArr||[]).forEach(x=>{ if (!ids.has(x.id) && !delList.includes(x.id)) localArr.push(x); });
    return localArr.filter(x=>!delList.includes(x.id));
  };
  localStorage.setItem(KEY,  JSON.stringify(mergeArr(load(),  p.records,   del.r)));
  localStorage.setItem(QKEY, JSON.stringify(mergeArr(loadQ(), p.questions, del.q)));
  localStorage.setItem(CKEY, JSON.stringify(mergeArr(loadC(), p.clients,   del.c)));
  migrateClients(); updateCount(); updateAskCount();
}
function clientById(id) { return loadC().find(c=>c.id===id); }
function clientRecs(id) { return load().filter(r=>r.clientId===id); }
/* 把舊紀錄的 client 字串轉成客戶實體（去重：忽略大小寫與前後空白） */
function migrateClients() {
  const cs = loadC(), recs = load();
  let cCh = false, rCh = false, seq = 0;
  const byId = {}; cs.forEach(c=>byId[c.id]=c);
  const byCode = {}; cs.forEach(c=>{ byCode[(c.code||'').trim().toLowerCase()] = c; });
  recs.forEach(r=>{
    if (r.clientId && byId[r.clientId]) return;
    const code = (r.client||'').trim();
    if (!code) { if (r.clientId) { r.clientId = ''; rCh = true; } return; }
    const k = code.toLowerCase();
    let c = byCode[k];
    if (!c) {
      c = { id: 'c'+Date.now()+'_'+(seq++), code, status:'active', preSessions:0, goal:'', note:'', created: r.date||todayStr() };
      cs.push(c); byCode[k] = c; byId[c.id] = c; cCh = true;
    }
    r.clientId = c.id; rCh = true;
  });
  if (cCh) localStorage.setItem(CKEY, JSON.stringify(cs));
  if (rCh) localStorage.setItem(KEY, JSON.stringify(recs));
  if (cCh || rCh) schedulePush();
}
/* 舊版自訂八項 → ICF 官方八項的勾選轉換：
   舊1提問探詢+舊7啟發式探詢 → 新7喚起覺察；舊2存在狀態+舊5臨在 → 新5保持臨在；
   新1道德實踐、新2教練心態為舊版沒有的項目，預設未勾 */
function migrateAcc(){
  const recs = load(); let ch = false;
  recs.forEach(r=>{
    if (r.accv === 2 || !Array.isArray(r.acc) || r.acc.length !== 8) return;
    const o = r.acc;
    const one = i => ({ on: !!(o[i]&&o[i].on), note: (o[i]&&o[i].note)||'' });
    const merge = (a,b) => ({ on: !!(o[a]&&o[a].on) || !!(o[b]&&o[b].on),
      note: [o[a]&&o[a].note, o[b]&&o[b].note].filter(Boolean).join('；') });
    r.acc = [ {on:false,note:''}, {on:false,note:''}, one(2), one(3), merge(1,4), one(5), merge(0,6), one(7) ];
    r.accv = 2; ch = true;
  });
  if (ch) { localStorage.setItem(KEY, JSON.stringify(recs)); schedulePush(); }
}

/* ===== 雲端同步（Firebase，選用；沒有填設定時自動用本機模式）===== */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA54LNw32KvnKGHjQm6U0qUQuwwUyIyBbc",
  authDomain: "coaching-log-9434c.firebaseapp.com",
  projectId: "coaching-log-9434c",
  appId: "1:376293497928:web:e5272b108bbc911a264c7d"
};
let fb = { app:null, auth:null, db:null, authMod:null, fsMod:null };
let currentUser = null, pushTimer = null;

async function initSync(){
  if (!FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.projectId){ startLocal(); return; }
  document.getElementById('app').classList.add('hidden');
  try {
    const V = '10.12.5';
    const appMod  = await import('https://www.gstatic.com/firebasejs/'+V+'/firebase-app.js');
    const authMod = await import('https://www.gstatic.com/firebasejs/'+V+'/firebase-auth.js');
    const fsMod   = await import('https://www.gstatic.com/firebasejs/'+V+'/firebase-firestore.js');
    fb.app = appMod.initializeApp(FIREBASE_CONFIG);
    fb.auth = authMod.getAuth(fb.app);
    fb.db = fsMod.getFirestore(fb.app);
    fb.authMod = authMod; fb.fsMod = fsMod;
    authMod.getRedirectResult(fb.auth).catch(()=>{});   // 完成手機的轉址登入
    authMod.onAuthStateChanged(fb.auth, (user)=>{ if (user) onLogin(user); else showAuth(); });
  } catch(e){ startLocal(); }
}
function startLocal(){
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  maybeOnboard();
}
function isInAppBrowser(){
  const ua = navigator.userAgent || '';
  return /FBAN|FBAV|FB_IAB|Instagram|Line\/|MicroMessenger|WhatsApp|Twitter|Snapchat|TikTok|musical_ly/i.test(ua);
}
function showAuth(){
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  authMsg('');   // 開啟時不顯示錯誤訊息
  // 依時段問候
  const g = document.getElementById('auth-greet');
  if (g){
    const h = new Date().getHours();
    g.textContent = h < 5  ? '夜深了。記完這一場，就好好休息。'
                  : h < 11 ? '早安。新的一天，從安靜的回顧開始。'
                  : h < 18 ? '午安。忙碌之間，也記得回頭看看自己。'
                  :          '晚安。今天也辛苦了。';
  }
  // 在 App 內建瀏覽器時，主動顯示引導（不等使用者按了才報錯）
  const hint = document.getElementById('inapp-hint');
  if (hint) hint.style.display = isInAppBrowser() ? '' : 'none';
}
function authMsg(m){ const el=document.getElementById('auth-msg'); if(el) el.textContent = m || ''; }
async function doGoogleLogin(){
  if (!fb.auth){ authMsg('雲端尚未設定'); return; }
  if (isInAppBrowser()){
    const hint = document.getElementById('inapp-hint');
    if (hint) hint.style.display = '';
    authMsg('');
    return;
  }
  authMsg('開啟 Google 登入…');
  const provider = new fb.authMod.GoogleAuthProvider();
  try {
    await fb.authMod.signInWithPopup(fb.auth, provider);   // 桌面：彈窗；成功後由 onAuthStateChanged 接手
    authMsg('');
  } catch(e){
    const code = e && e.code;
    if (code==='auth/popup-blocked' || code==='auth/cancelled-popup-request' || code==='auth/popup-closed-by-user' || code==='auth/operation-not-supported-in-this-environment'){
      try { await fb.authMod.signInWithRedirect(fb.auth, provider); }   // 手機：改用整頁轉址
      catch(e2){ authMsg(e2 && e2.message ? e2.message : '登入失敗，請再試一次'); }
    } else {
      authMsg(e && e.message ? e.message : '登入失敗，請再試一次');
    }
  }
}
async function onLogin(user){
  if (currentUser && currentUser.uid === user.uid) return;
  currentUser = user;
  authMsg('');
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('acct-email').textContent = '已登入：' + (user.displayName || user.email || '');
  document.getElementById('acct-bar').classList.remove('hidden');
  await syncPull();
  showView('new');
  maybeOnboard();
}
async function doLogout(){
  if (fb.auth){ try { await fb.authMod.signOut(fb.auth); } catch(e){} }
  currentUser = null;
  localStorage.removeItem(KEY); localStorage.removeItem(QKEY); localStorage.removeItem(CKEY);
  localStorage.removeItem(DKEY); localStorage.removeItem(SKEY);
  updateCount(); updateAskCount();
  document.getElementById('acct-bar').classList.add('hidden');
  showAuth();
}
async function syncPull(){
  if (!fb.db || !currentUser) return;
  try {
    const ref = fb.fsMod.doc(fb.db, 'user_data', currentUser.uid);
    const snap = await fb.fsMod.getDoc(ref);
    if (snap.exists() && snap.data().payload){
      const p = JSON.parse(snap.data().payload);
      if (Array.isArray(p.records))   localStorage.setItem(KEY,  JSON.stringify(p.records));
      if (Array.isArray(p.questions)) localStorage.setItem(QKEY, JSON.stringify(p.questions));
      if (Array.isArray(p.clients))   localStorage.setItem(CKEY, JSON.stringify(p.clients));
      if (p.deleted && p.deleted.r)   storeDel(p.deleted);
      localStorage.setItem(SKEY, String(snap.data().updated_at || Date.now()));
    } else {
      await pushCloud(); // 雲端還沒資料，把本機的推上去
    }
  } catch(e){ toast('⚠️ 無法讀取雲端資料，目前顯示本機內容'); }
  migrateQ(); migrateClients(); migrateAcc(); buildClientSel(''); updateCount(); updateAskCount();
}
function schedulePush(){
  if (!fb.db || !currentUser) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushCloud, 800);
}
async function pushCloud(){
  if (!fb.db || !currentUser) return;
  try {
    const ref = fb.fsMod.doc(fb.db, 'user_data', currentUser.uid);
    // 防止互相覆蓋：若雲端有這台裝置沒看過的更新（另一台寫的），先併進本機再寫回
    const lastSynced = parseInt(localStorage.getItem(SKEY), 10) || 0;
    try {
      const snap = await fb.fsMod.getDoc(ref);
      if (snap.exists() && (snap.data().updated_at || 0) > lastSynced && snap.data().payload){
        mergeCloud(JSON.parse(snap.data().payload));
      }
    } catch(e){}
    const now = Date.now();
    await fb.fsMod.setDoc(ref, { payload: JSON.stringify({ records: load(), questions: loadQ(), clients: loadC(), deleted: loadDel() }), updated_at: now });
    localStorage.setItem(SKEY, String(now));
    pushFailed = false;
  } catch(e){
    if (!pushFailed) { pushFailed = true; toast('⚠️ 雲端同步失敗，資料仍保存在本機'); }
  }
}
let pushFailed = false;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ---- mentor questions ---- */
function updateAskCount() {
  const n = loadQ().filter(x=>!x.answered).length;
  document.getElementById('askCnt').textContent = n ? '('+n+')' : '';
}
function addQuestion() {
  const q = document.getElementById('ask-q').value.trim();
  if (!q) { toast('請先寫問題'); return; }
  const ctx = document.getElementById('ask-ctx').value.trim();
  const arr = loadQ();
  arr.push({ id: Date.now(), q, ctx, answer:'', answered:false, created: todayStr() });
  storeQ(arr);
  document.getElementById('ask-q').value = '';
  document.getElementById('ask-ctx').value = '';
  updateAskCount(); renderAsk(); toast('已加入清單');
}
function addQuestionFromRecord(id) {
  const r = load().find(x=>x.id===id);
  if (!r || !r.instant) return;
  const arr = loadQ();
  if (arr.some(x=> x.q === r.instant)) { toast('這題已加過了'); return; }
  arr.push({ id: Date.now(), q: r.instant, ctx: buildCtx(r), answer:'', answered:false, created: todayStr() });
  storeQ(arr); updateAskCount(); toast('已加入導師提問清單');
}
function renderAsk() {
  const arr = loadQ().sort((a,b)=>b.id-a.id);
  const pend = arr.filter(x=>!x.answered);
  const done = arr.filter(x=>x.answered);
  const pItem = x => `<div class="qcard">
    <div class="qtext">${esc(x.q)}</div>
    ${x.ctx?`<div class="qctx">情境：${esc(x.ctx)}</div>`:''}
    <textarea class="qans" id="ans-${x.id}" placeholder="導師的回答…"></textarea>
    <div class="qbtns">
      <button class="mini-link" onclick="saveAnswer(${x.id})">存下答案</button>
      <button class="mini-link del-link" onclick="deleteQuestion(${x.id})">刪除</button>
    </div></div>`;
  const dItem = x => `<div class="qcard done">
    <div class="qtext">${esc(x.q)}</div>
    ${x.ctx?`<div class="qctx">情境：${esc(x.ctx)}</div>`:''}
    <div class="qanswer"><span class="alabel">導師回答</span>${esc(x.answer)}</div>
    <div class="qbtns">
      <button class="mini-link" onclick="reopenQuestion(${x.id})">改回待問</button>
      <button class="mini-link del-link" onclick="deleteQuestion(${x.id})">刪除</button>
    </div></div>`;
  document.getElementById('ask-list').innerHTML =
    `<div class="ask-sub">待回答（${pend.length}）</div>` +
    (pend.length ? pend.map(pItem).join('') : '<div class="empty" style="padding:14px 0">目前沒有待問的問題</div>') +
    `<div class="ask-sub" style="margin-top:18px">已回答（${done.length}）</div>` +
    (done.length ? done.map(dItem).join('') : '<div class="empty" style="padding:14px 0">還沒有已回答的問題</div>');
}
function saveAnswer(id) {
  const val = document.getElementById('ans-'+id).value.trim();
  if (!val) { toast('請先填答案'); return; }
  const arr = loadQ(); const it = arr.find(x=>x.id===id);
  if (it) { it.answer = val; it.answered = true; storeQ(arr); }
  updateAskCount(); renderAsk(); toast('已記錄答案');
}
function reopenQuestion(id) {
  const arr = loadQ(); const it = arr.find(x=>x.id===id);
  if (it) { it.answered = false; storeQ(arr); }
  updateAskCount(); renderAsk();
}
function deleteQuestion(id) {
  if (!confirm('刪除這個問題？')) return;
  markDeleted('q', id);
  storeQ(loadQ().filter(x=>x.id!==id));
  updateAskCount(); renderAsk(); toast('已刪除');
}
function exportPending() {
  const pend = loadQ().filter(x=>!x.answered);
  if (!pend.length) { toast('沒有待問的問題'); return; }
  const text = '要問導師的問題：\n\n' + pend.map((x,i)=>(i+1)+'. '+x.q+(x.ctx?'（'+x.ctx+'）':'')).join('\n');
  navigator.clipboard.writeText(text).then(()=>toast('待問清單已複製'),()=>{
    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select();
    try{document.execCommand('copy');toast('待問清單已複製');}catch(e){toast('複製失敗');} ta.remove();
  });
}
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function numToCh(n){
  const m=['零','一','二','三','四','五','六','七','八','九'];
  const i=parseInt(n,10);
  if (isNaN(i)||i<0) return String(n);
  if (i<10) return m[i];
  if (i===10) return '十';
  if (i<20) return '十'+m[i%10];
  if (i<100) return m[Math.floor(i/10)]+'十'+(i%10? m[i%10]:'');
  return String(i);
}
function chToNum(s){
  const m = {'零':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
  if (/^\d+$/.test(s)) return parseInt(s,10);
  if (!/^[零一二三四五六七八九十]+$/.test(s)) return null;
  if (s === '十') return 10;
  const i = s.indexOf('十');
  if (i < 0) return s.length===1 ? m[s] : null;
  const tens = i===0 ? 1 : m[s[0]];
  const ones = i===s.length-1 ? 0 : m[s[s.length-1]];
  if (tens==null || ones==null) return null;
  return tens*10 + ones;
}
/* 從會談次數欄位解析出數字：'第三次'、'第3次會談'、'三'、'3' → 3；解析不了回 null */
function parseSessionNum(s){
  s = (s||'').trim();
  if (!s) return null;
  const m = s.match(/^第\s*([0-9零一二三四五六七八九十]+)\s*次/);
  if (m) return chToNum(m[1]);
  if (/^[0-9]+$/.test(s) || /^[零一二三四五六七八九十]+$/.test(s)) return chToNum(s);
  return null;
}
function formatSession(s){
  s = (s||'').trim();
  if (!s) return '';
  if (/^\d+$/.test(s)) return '第'+numToCh(s)+'次會談';              // 1 -> 第一次會談
  if (/^[零一二三四五六七八九十]+$/.test(s)) return '第'+s+'次會談';   // 一 -> 第一次會談
  if (s.indexOf('會談') < 0) return s+'會談';                        // 第一次 -> 第一次會談
  return s;                                                          // 第一次會談 -> 不變
}
function buildCtx(r){ return ((r.client||'')+' '+formatSession(r.session||'')).trim(); }
function migrateQ(){
  const arr = loadQ(); let changed = false;
  arr.forEach(x=>{
    if (!x.ctx) return;
    const orig = x.ctx; let m;
    if ((m = x.ctx.match(/^(.*\S)\s+(\d+)$/)))
      x.ctx = m[1]+' 第'+numToCh(m[2])+'次會談';                       // "詩瑜 1"
    else if ((m = x.ctx.match(/^(.*\S)\s+([零一二三四五六七八九十]+)會談$/)))
      x.ctx = m[1]+' 第'+m[2]+'次會談';                                // "詩瑜 一會談"
    else if ((m = x.ctx.match(/^(.*\S)\s+([零一二三四五六七八九十]+)$/)))
      x.ctx = m[1]+' 第'+m[2]+'次會談';                                // "詩瑜 一"
    if (x.ctx !== orig) changed = true;
  });
  if (changed) storeQ(arr);
}
function downloadBlob(content, filename, mime){
  const blob = new Blob([content], {type: mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click(); URL.revokeObjectURL(a.href);
}

/* ---- export: Excel .xlsx (mentor questions) — self-contained, no library ---- */
function xmlEsc(s){ return (s==null?'':String(s)).replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g,'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c])); }
function _crc32(bytes){
  if(!_crc32.t){ _crc32.t=[]; for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); _crc32.t[n]=c>>>0; } }
  const t=_crc32.t; let crc=-1;
  for(let i=0;i<bytes.length;i++) crc=(crc>>>8)^t[(crc^bytes[i])&0xFF];
  return (crc^-1)>>>0;
}
function _zip(files){
  const enc=new TextEncoder(), chunks=[], central=[]; let offset=0;
  const u16=n=>[n&0xff,(n>>8)&0xff], u32=n=>[n&0xff,(n>>8)&0xff,(n>>16)&0xff,(n>>24)&0xff];
  files.forEach(f=>{
    const name=enc.encode(f.name), data=f.data, crc=_crc32(data);
    const lh=new Uint8Array([].concat(u32(0x04034b50),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0)));
    chunks.push(lh,name,data);
    central.push(new Uint8Array([].concat(u32(0x02014b50),u16(20),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset))));
    central.push(name);
    offset += lh.length+name.length+data.length;
  });
  const cStart=offset; let cSize=0;
  central.forEach(c=>{ chunks.push(c); cSize+=c.length; });
  chunks.push(new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cSize),u32(cStart),u16(0))));
  let total=0; chunks.forEach(c=>total+=c.length);
  const out=new Uint8Array(total); let p=0; chunks.forEach(c=>{ out.set(c,p); p+=c.length; });
  return out;
}

/* ---- trend chart (self-contained SVG, no library) ---- */
function renderChart() {
  let arr = load();
  if (histFilter) arr = arr.filter(r=>r.clientId===histFilter);
  arr = arr.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'') || a.id-b.id);
  const card = document.getElementById('chart-card');
  const hintEl = document.getElementById('chart-hint');
  if (arr.length < 2) { card.style.display = 'none'; return; }
  card.style.display = '';
  if (hintEl) hintEl.textContent = (!histFilter && arr.length > 20) ? '（最近 20 筆）' : '';
  if (!histFilter && arr.length > 20) arr = arr.slice(-20);
  const labels = arr.map(r => histFilter ? (r.session || (r.date||'').slice(5) || '') : (r.client || r.date || ''));
  const series = [
    { name:'自評表現', color:'#b08968', vals: arr.map(r=>parseFloat(r.perf)) },
    { name:'我的感受', color:'#5a9e5f', vals: arr.map(r=>parseFloat(r.feel)) },
    { name:'客戶感受', color:'#4f7fb5', vals: arr.map(r=>r.clientfeel!=null?parseFloat(r.clientfeel):null) }
  ];
  document.getElementById('trendChart').innerHTML = svgLineChart(labels, series);
}
function escSvg(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function svgLineChart(labels, series) {
  const W=600, H=250, padL=26, padR=14, padT=30, padB=44;
  const plotW=W-padL-padR, plotH=H-padT-padB, n=labels.length;
  const X=i=> n===1 ? padL+plotW/2 : padL + plotW*i/(n-1);
  const Y=v=> padT + plotH*(1 - v/10);
  let g='';
  for (let v=0; v<=10; v+=2){
    const yy=Y(v);
    g+=`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#ece4d7" stroke-width="1"/>`;
    g+=`<text x="${padL-5}" y="${yy+3}" font-size="9" fill="#a39b8e" text-anchor="end">${v}</text>`;
  }
  labels.forEach((lb,i)=>{
    const t = lb.length>6 ? lb.slice(0,6)+'…' : lb;
    g+=`<text x="${X(i)}" y="${H-padB+16}" font-size="9" fill="#8a8378" text-anchor="middle">${escSvg(t)}</text>`;
  });
  // 繪製順序：把「我的感受」畫在最上層，避免與其他線重疊時被蓋掉
  const drawOrder = [series[0], series[2], series[1]].filter(Boolean);
  drawOrder.forEach(s=>{
    const pts=[];
    s.vals.forEach((v,i)=>{ if(v!=null && !isNaN(v)) pts.push(X(i).toFixed(1)+','+Y(v).toFixed(1)); });
    if (pts.length>1) g+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
    s.vals.forEach((v,i)=>{ if(v!=null && !isNaN(v)) g+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3.4" fill="${s.color}" stroke="#fff" stroke-width="1.2"/>`; });
  });
  let lx=padL, legend='';
  series.forEach(s=>{
    legend+=`<circle cx="${lx+4}" cy="12" r="4" fill="${s.color}"/><text x="${lx+12}" y="15" font-size="10" fill="#6b655c">${s.name}</text>`;
    lx += 22 + s.name.length*11;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">${legend}${g}</svg>`;
}

/* ---- backup / restore / export ---- */
function backupJSON() {
  const data = { records: load(), questions: loadQ(), clients: loadC(), exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '會談紀錄備份_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('已下載備份檔');
}
function restoreJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const d = JSON.parse(reader.result);
      const incoming = Array.isArray(d) ? d : (d.records||[]);
      if (!Array.isArray(incoming)) throw 0;
      const cur = load();
      const ids = new Set(cur.map(r=>r.id));
      let added = 0;
      incoming.forEach(r=>{ if(!ids.has(r.id)){ cur.push(r); added++; } });
      store(cur);
      if (d.questions && Array.isArray(d.questions)) {
        const qcur = loadQ(); const qids = new Set(qcur.map(x=>x.id));
        d.questions.forEach(x=>{ if(!qids.has(x.id)) qcur.push(x); });
        storeQ(qcur); updateAskCount();
      }
      if (d.clients && Array.isArray(d.clients)) {
        const ccur = loadC(); const cids = new Set(ccur.map(x=>x.id));
        d.clients.forEach(x=>{ if(!cids.has(x.id)) ccur.push(x); });
        storeC(ccur);
      }
      migrateClients(); migrateAcc(); buildClientSel(''); buildHistFilter();
      updateCount(); renderHist(); renderChart();
      toast('已還原，新增 '+added+' 筆');
    } catch(err){ toast('這個檔案讀不出來，請確認是本工具下載的備份檔'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}
function exportAllText() {
  let arr = load();
  const fc = histFilter ? clientById(histFilter) : null;
  if (fc) arr = arr.filter(r=>r.clientId===histFilter);
  arr = arr.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'') || b.id-a.id);
  if (!arr.length) { toast('沒有紀錄'); return; }
  const blocks = arr.map(r => recordToText(r));
  const text = blocks.join('\n\n──────────\n\n');
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '會談紀錄_' + (fc?fc.code:'全部') + '_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click(); URL.revokeObjectURL(a.href);
  toast(fc ? '已匯出（'+fc.code+'）' : '已匯出全部文字');
}
function recordToText(r) {
  const lines = [];
  lines.push('日期：'+(r.date||''));
  lines.push('客戶：'+(r.client||''));
  lines.push('會談次數：'+(r.session||''));
  if(r.mins) lines.push('時長：'+r.mins+' 分鐘');
  if(r.instant) lines.push('馬上掉出來的問題：'+r.instant);
  lines.push('自評表現：'+r.perf);
  lines.push('自評感受：'+r.feel);
  if(r.clientfeel!=null) lines.push('我覺得客戶的感受：'+r.clientfeel);
  if(r.because) lines.push('　因為：'+r.because);
  if(r.good&&r.good.length){ lines.push('我做得好的：'); r.good.forEach((g,i)=>lines.push('  '+(i+1)+'. '+g)); }
  if(r.insight) lines.push('客戶受到啟發／頓悟的時刻：'+r.insight);
  if(r.improve&&r.improve.length){ lines.push('我可以改進的部分：'); r.improve.forEach((g,i)=>lines.push('  '+(i+1)+'. '+g)); }
  if(r.special&&r.special.length){ lines.push('這次的特殊狀況：'); r.special.forEach((g,i)=>lines.push('  '+(i+1)+'. '+g)); }
  const accDone = (r.acc||[]).map((x,i)=>x.on?('    ✓ 核心職能 '+ACC[i][0]+(x.note?'　—　'+x.note:'')):'').filter(Boolean);
  const accUndone = (r.acc||[]).map((x,i)=>!x.on?('    ✗ 核心職能 '+ACC[i][0]):'').filter(Boolean);
  lines.push('ACC 標記：');
  lines.push('  有做到（'+accDone.length+'）：');
  if(accDone.length) accDone.forEach(l=>lines.push(l)); else lines.push('    —');
  lines.push('  沒做到（'+accUndone.length+'）：');
  if(accUndone.length) accUndone.forEach(l=>lines.push(l)); else lines.push('    —');
  return lines.join('\n');
}

/* ---- dynamic list items ---- */
function addItem(listId, val="") {
  const list = document.getElementById(listId);
  const div = document.createElement('div');
  div.className = 'multi-item';
  const ta = document.createElement('textarea');
  ta.value = val; ta.rows = 1;

/* ---- ACC checklist ---- */
function buildAcc() {
  const box = document.getElementById('acc-list');
  box.innerHTML = '';
  ACC.forEach((a, i) => {
    const item = document.createElement('div');
    item.className = 'acc-item'; item.id = 'acc-'+i;
    item.innerHTML = `
      <div class="acc-head">
        <input type="checkbox" id="acc-chk-${i}">
        <div>
          <div class="acc-title">核心職能 ${a[0]}</div>
          <div class="acc-desc">${a[1]}</div>
        </div>
      </div>
      <div class="acc-note"><input type="text" id="acc-note-${i}" placeholder="這項的具體事例／備註（選填）"></div>`;
    const chk = item.querySelector('input[type=checkbox]');
    item.querySelector('.acc-head').onclick = (e) => {
      if (e.target.tagName !== 'INPUT') chk.checked = !chk.checked;
      item.classList.toggle('checked', chk.checked);

  });

function getAcc() {

/* ---- save ---- */
function saveRecord() {
  const selVal = document.getElementById('f-client-sel').value;
  let clientId = '', clientCode = '';
  if (selVal === '__new__') {
    clientCode = document.getElementById('f-client-new').value.trim();
    if (clientCode) {
      const cs = loadC();
      let c = cs.find(x=>(x.code||'').trim().toLowerCase()===clientCode.toLowerCase());
      if (!c) {
        const pre = parseInt(document.getElementById('f-client-pre').value,10)||0;
        c = { id:'c'+Date.now(), code:clientCode, status:'active', preSessions:pre, goal:'', note:'', created:todayStr() };
        cs.push(c); storeC(cs);
      }
      clientId = c.id; clientCode = c.code;
    }
  } else if (selVal) {
    const c = clientById(selVal);
    if (c) { clientId = c.id; clientCode = c.code; }
  }
  const rec = {
    id: editId || Date.now(),
    date: document.getElementById('f-date').value,
    session: document.getElementById('f-session').value.trim(),
    mins: document.getElementById('f-mins').value.trim(),
    client: clientCode,
    clientId: clientId,
    instant: document.getElementById('f-instant').value.trim(),
    perf: document.getElementById('f-perf').value,
    feel: document.getElementById('f-feel').value,
    clientfeel: document.getElementById('f-clientfeel').value,
    because: document.getElementById('f-because').value.trim(),
    good: getItems('good-list'),
    insight: document.getElementById('f-insight').value.trim(),
    improve: getItems('improve-list'),
    special: getItems('special-list'),
    acc: getAcc(),
    accv: 2
  };
  if (!rec.client && !rec.instant) { toast('請至少填客戶或問題'); return; }
  const arr = load();
  if (editId) {
    const idx = arr.findIndex(r=>r.id===editId);
    if (idx>=0) arr[idx] = rec;
  } else {
    arr.push(rec);
  }
  store(arr);
  toast(editId ? '已更新 ✓' : '已記下這一場。辛苦了 🌱');
  editId = null;
  document.getElementById('saveBtn').textContent = '儲存紀錄';
  resetForm();
  updateCount();
  showView('hist');
}

/* 累積統計（首頁小字） */
function updateStats(){
  const el = document.getElementById('stats-line');
  if (!el) return;
  const recs = load();
  if (!recs.length) { el.textContent = ''; return; }
  const goods = recs.reduce((s,r)=>s+((r.good||[]).length),0);
  const mins = recs.reduce((s,r)=>s+(parseInt(r.mins,10)||0),0);
  el.textContent = '　·　已累積 '+recs.length+' 次會談'
    + (mins ? '、'+(Math.round(mins/60*10)/10)+' 小時' : '')

}
/* 教練時數破關儀表板（客戶頁）：原生 CSS 進度條 */
function renderHours(){
  const card = document.getElementById('hours-card');
  const recs = load();
  if (!recs.length) { card.style.display = 'none'; return; }
  card.style.display = '';
  const withMins = recs.filter(r=>parseInt(r.mins,10)>0);
  const cut = new Date(); cut.setMonth(cut.getMonth()-18);
  const cutStr = cut.getFullYear()+'-'+String(cut.getMonth()+1).padStart(2,'0')+'-'+String(cut.getDate()).padStart(2,'0');
  const h = m => Math.round(m/60*10)/10;
  const totalH  = h(withMins.reduce((s,r)=>s+parseInt(r.mins,10),0));
  const recentH = h(withMins.filter(r=>(r.date||'') >= cutStr).reduce((s,r)=>s+parseInt(r.mins,10),0));
  const nClients = new Set(recs.map(r=>r.clientId).filter(Boolean)).size;
  const bar = (name, val, goal, unit) => {
    const pct = Math.min(100, goal ? val/goal*100 : 0);
    const done = val >= goal;
    return `<div class="pb-row">
      <div class="pb-head">
        <span class="pb-name">${name}</span>
        <span class="pb-val">${val} / ${goal} ${unit}${done?'　<span class="done-tag">✓ 達標</span>':''}</span>
      </div>
      <div class="pb-track"><div class="pb-fill${done?' done':''}" data-w="${pct.toFixed(1)}" style="width:0%"></div></div>
    </div>`;
  };
  document.getElementById('hours-stats').innerHTML =
    bar('總時數', totalH, 100, '小時') +
    bar('近 18 個月', recentH, 25, '小時') +
    bar('不重複客戶', nClients, 8, '位') +
    (withMins.length < recs.length ? '<div class="pb-note">有 '+(recs.length-withMins.length)+' 筆未填時長，未計入時數</div>' : '');
  // 微互動：下一個 frame 再設寬度，讓 transition 從 0 長出來
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('#hours-stats .pb-fill').forEach(el=>{ el.style.width = el.dataset.w + '%'; });
  }));
}

function buildClientSel(selId){
  const sel = document.getElementById('f-client-sel');
  if (!sel) return;
  const cs = loadC().slice().sort((a,b)=>
    ((a.status==='closed')?1:0)-((b.status==='closed')?1:0) || (a.code||'').localeCompare(b.code||'','zh-Hant'));
  sel.innerHTML = '<option value="">— 選擇客戶 —</option>' +
    cs.map(c=>'<option value="'+c.id+'">'+esc(c.code)+(c.status==='closed'?'（已結案）':'')+'</option>').join('') +
    '<option value="__new__">＋ 新增客戶…</option>';

function onClientSelChange(){
  const sel = document.getElementById('f-client-sel');
  const box = document.getElementById('f-client-newbox');
  if (!sel || !box) return;
  box.classList.toggle('hidden', sel.value !== '__new__');
  showLastImprove(sel.value === '__new__' ? '' : sel.value);

  autoSessionFill();
}
/* 閉環提醒：選了客戶就帶出上次的「可改進」，讓這次會談前先看見 */
function showLastImprove(clientId){
  const box = document.getElementById('f-lastimprove');
  if (!box) return;
  box.classList.add('hidden'); box.innerHTML = '';
  if (!clientId || editId) return;   // 編輯舊紀錄時不顯示，避免時間對不上
  const rs = clientRecs(clientId).sort((a,b)=>(b.date||'').localeCompare(a.date||'') || b.id-a.id);
  const last = rs.find(r=>r.improve && r.improve.length);
  if (!last) return;
  box.innerHTML = '💡 <b>上次（'+(last.date||'')+'）你想改進：</b>' +
    last.improve.map(t=>'「'+esc(t)+'」').join('、') + '——這次有做到嗎？';
  box.classList.remove('hidden');
}
/* 新客戶：依「之前已談次數」帶入下一次編號 */
function newClientPreChange(){
  if (editId) return;
  const sess = document.getElementById('f-session');
  const cur = sess.value.trim();
  if (cur && cur !== lastAutoSession) return;
  const pre = parseInt(document.getElementById('f-client-pre').value,10)||0;
  sess.value = '第' + numToCh(pre+1) + '次';
  lastAutoSession = sess.value;
}
/* 自動算第幾次：以「此日期之前最近一筆有編號的紀錄」為基準往下接，
   所以中間有沒記到的會談時，只要把某一筆的次數手動改對，之後就會接著正確編號。
   找不到基準時退回「開始記錄前已談次數 + 紀錄數 + 1」。
   只覆蓋空白或自己剛帶入的值，不動使用者手改過的值。 */
function autoSessionFill(){
  if (editId) return;
  const sel = document.getElementById('f-client-sel');
  if (!sel || !sel.value || sel.value === '__new__') return;
  const sess = document.getElementById('f-session');
  const cur = sess.value.trim();
  if (cur && cur !== lastAutoSession) return;
  const c = clientById(sel.value); if (!c) return;
  const d = document.getElementById('f-date').value || todayStr();
  const rs = clientRecs(sel.value).filter(r=>(r.date||'') <= d)
    .sort((a,b)=>(a.date||'').localeCompare(b.date||'') || a.id-b.id);
  let n = null;
  for (let i = rs.length-1; i >= 0; i--){
    const p = parseSessionNum(rs[i].session);
    if (p != null){ n = p + (rs.length-1-i) + 1; break; }   // 基準編號 + 基準之後的紀錄數 + 1
  }
  if (n == null) n = (parseInt(c.preSessions,10)||0) + rs.length + 1;
  sess.value = '第' + numToCh(n) + '次';
  lastAutoSession = sess.value;
}

function saveClient(id){

  const recs = load(); let ch = false;
  recs.forEach(r=>{ if (r.clientId===id && r.client!==code) { r.client = code; ch = true; } });

function renumberClient(id){
  const c = clientById(id); if (!c) return;
  const off = parseInt(c.preSessions,10)||0;
  const rs = clientRecs(id).sort((a,b)=>(a.date||'').localeCompare(b.date||'') || a.id-b.id);

  if (!confirm('依日期順序重新編號這位客戶的 '+rs.length+' 筆紀錄？\n（從第'+numToCh(off+1)+'次開始「連續」編號，會覆蓋原本的會談次數欄位；若中間有沒記到的會談，請不要用這個，改為手動修正該筆次數）')) return;
  const map = {};
  rs.forEach((r,i)=>{ map[r.id] = '第'+numToCh(off+i+1)+'次'; });
  const recs = load();
  recs.forEach(r=>{ if (map[r.id]) r.session = map[r.id]; });

let insightOpen = false;
let _insightImps = [], _insightGoods = [];
function toggleInsight(){
  insightOpen = !insightOpen;
  document.getElementById('insight-body').classList.toggle('collapsed', !insightOpen);
  document.getElementById('insight-arrow').textContent = insightOpen ? '收合 ▴' : '展開 ▾';

function renderInsight(){
  let arr = load();
  if (histFilter) arr = arr.filter(r=>r.clientId===histFilter);
  arr = arr.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'') || b.id-a.id);
  _insightGoods = []; _insightImps = [];
  arr.forEach(r=>{
    (r.good||[]).forEach(t=>_insightGoods.push({t, r}));
    (r.improve||[]).forEach(t=>_insightImps.push({t, r}));
  });
  const meta = r => `<span class="qctx">${esc(r.client)||''}　${r.date||''}</span>`;
  const gHtml = _insightGoods.length
    ? _insightGoods.map(x=>`<div class="insight-item">✓ ${esc(x.t)}${meta(x.r)}</div>`).join('')
    : '<div class="acc-none">還沒有內容</div>';
  const iHtml = _insightImps.length
    ? _insightImps.map((x,i)=>`<div class="insight-item">△ ${esc(x.t)}${meta(x.r)}　<button class="mini-link" onclick="askImprove(${i})">＋問導師</button></div>`).join('')
    : '<div class="acc-none">還沒有內容</div>';
  document.getElementById('insight-body').innerHTML =
    `<div class="ask-sub" style="margin-top:2px">我的強項（${_insightGoods.length}）</div>` + gHtml +
    `<div class="ask-sub" style="margin-top:14px">待改進（${_insightImps.length}）</div>` + iHtml +
    `<div class="actions" style="margin-top:12px">
      <button class="btn btn-ghost" onclick="copyStrengths()">複製強項清單</button>

function askImprove(i){

  if (arr.some(y=>y.q===q)) { toast('這題已加過了'); return; }
  arr.push({ id: Date.now(), q, ctx: buildCtx(x.r), answer:'', answered:false, created: todayStr() });
  storeQ(arr); updateAskCount(); toast('已加入導師提問清單');

function copyText(text, ok){

    try{document.execCommand('copy');toast(ok);}catch(e){toast('複製失敗');} ta.remove();
  });
}

　合格：當下承認並肯定客戶的洞察與學習；探索客戶所表達的情感、觀點、關注點與信念；對客戶整體（這個人）而非僅其問題或情境表達支持與關心

　合格：整個會談保持好奇心；對客戶提出的情境予以承認；至少部分時間允許客戶引導對話方向；在對話與沉默中為反思創造空間
　未達標準：由教練持續主導對話；對客戶提供的資訊沒有回應；注意力集中在自己的表現或展示對主題的知識

　未達標準：持續專注於指導客戶，或分享自己的知識、想法或信念；大部分問題屬於引導式或包含預設答案；提問關注的議題並非由客戶設定

以下是逐字稿：

/* 教練反思統計報告（歷史頁）：平均分數、能量對齊指數、最常展現的職能 */
let reflectDays = 30;
function setReflectPeriod(d){ reflectDays = d; renderReflect(); }
function renderReflect(){
  const card = document.getElementById('reflect-card');
  if (!card) return;
  if (!load().length) { card.style.display = 'none'; return; }
  card.style.display = '';
  document.querySelectorAll('#reflect-card .pchip').forEach(b=>
    b.classList.toggle('on', parseInt(b.dataset.d,10) === reflectDays));
  let arr = load();
  if (histFilter) arr = arr.filter(r=>r.clientId===histFilter);
  if (reflectDays > 0){
    const c = new Date(Date.now() - reflectDays*86400000);
    const cutStr = c.getFullYear()+'-'+String(c.getMonth()+1).padStart(2,'0')+'-'+String(c.getDate()).padStart(2,'0');
    arr = arr.filter(r=>(r.date||'') >= cutStr);
  }
  const body = document.getElementById('reflect-body');
  if (!arr.length){ body.innerHTML = '<div class="empty" style="padding:14px 0">這段期間沒有紀錄</div>'; return; }
  const avg = vals => { const v = vals.filter(x=>!isNaN(x)); return v.length ? Math.round(v.reduce((s,x)=>s+x,0)/v.length*10)/10 : null; };
  const aPerf = avg(arr.map(r=>parseFloat(r.perf)));
  const aFeel = avg(arr.map(r=>parseFloat(r.feel)));
  const aCf   = avg(arr.map(r=>r.clientfeel!=null?parseFloat(r.clientfeel):NaN));
  // 能量對齊指數：每筆三分數的最大差距，取平均（差距越小＝越同頻）
  const spreads = arr.map(r=>{
    const v = [parseFloat(r.perf), parseFloat(r.feel), r.clientfeel!=null?parseFloat(r.clientfeel):NaN].filter(x=>!isNaN(x));
    return v.length >= 2 ? Math.max(...v) - Math.min(...v) : null;
  }).filter(x=>x!=null);
  let energyHtml = '<span class="hint">填入分數的紀錄不足，暫時無法計算</span>';
  if (spreads.length){
    const sp = Math.round(spreads.reduce((s,x)=>s+x,0)/spreads.length*10)/10;
    let tag, cls, msg;
    if (sp <= 1)      { tag='高度同頻'; cls='energy-good'; msg='你、你的表現與客戶幾乎在同一個頻率上，臨在狀態很穩，繼續保持。'; }
    else if (sp <= 2) { tag='大致同頻'; cls='energy-good'; msg='多數會談中你和客戶的狀態接近，偶有落差——留意那幾次發生了什麼。'; }
    else if (sp <= 3) { tag='偶有落差'; cls='energy-mid';  msg='你的感受和客戶感受常不同步，會談中可以多做一次狀態核對（「你現在感覺如何？」）。'; }
    else              { tag='落差偏大'; cls='energy-low';  msg='分數間的落差偏大，建議直接和客戶核對感受，並把觀察到的證據寫進「因為」欄位。'; }
    energyHtml = '<span class="energy-tag '+cls+'">'+tag+'</span>平均差距 <b>'+sp+'</b> 分。'+msg;
  }
  // 最常勾選的核心職能（前三）
  const cnt = ACC.map(()=>0);
  arr.forEach(r=>(r.acc||[]).forEach((x,i)=>{ if (x.on) cnt[i]++; }));
  const top = cnt.map((n,i)=>({n,i})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n || a.i-b.i).slice(0,3);
  const accHtml = top.length
    ? '這段期間你最穩定展現的是：' + top.map(x=>'<b>'+ACC[x.i][0].replace(/^\d+ · /,'')+'</b>（'+x.n+'/'+arr.length+' 次）').join('、')
      + '。這是你教練風格的底色，值得肯定。'
    : '<span class="hint">這段期間還沒有勾選職能標記</span>';
  const cell = (n,name) => '<div class="reflect-score"><div class="rs-num">'+(n!=null?n:'–')+'</div><div class="rs-name">'+name+'</div></div>';
  body.innerHTML =
    '<div class="reflect-scores">' + cell(aPerf,'平均自評表現') + cell(aFeel,'平均自評感受') + cell(aCf,'平均客戶感受') + '</div>'
    + '<div class="reflect-line">⚡ <b>能量對齊：</b>' + energyHtml + '</div>'
    + '<div class="reflect-line">🌟 <b>職能亮點：</b>' + accHtml + '</div>'
    + '<div class="reflect-line" style="color:#a39b8e;font-size:12px">共 ' + arr.length + ' 筆紀錄'
    + (histFilter && clientById(histFilter) ? '（客戶：'+esc(clientById(histFilter).code)+'）' : '') + '</div>';
}

/* 導師督導包：彙整待問問題 + 浮現的問題 + 待改進，去識別化打包 */
let _mentorPack = '';
function buildMentorPack(){
  let recs = load();
  const fc = histFilter ? clientById(histFilter) : null;
  if (fc) recs = recs.filter(r=>r.clientId===histFilter);
  recs = recs.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'') || b.id-a.id).slice(0, 10);
  const pend = loadQ().filter(x=>!x.answered).sort((a,b)=>a.id-b.id);
  const ctx = r => ((r.client||'')+' '+formatSession(r.session||'')).trim();
  const L = [];
  L.push('# 導師督導包');
  L.push('產生日期：'+todayStr()+(fc ? '　範圍：客戶 '+fc.code : '　範圍：全部客戶'));
  L.push('資料：最近 '+recs.length+' 次會談（客戶均為代號，無可辨識個資）');
  L.push('');
  L.push('---');
  L.push('');
  L.push('## 一、想問導師的問題（待回答 '+pend.length+' 題）');
  L.push('');
  if (pend.length) pend.forEach((x,i)=>L.push((i+1)+'. '+x.q+(x.ctx?'（情境：'+x.ctx+'）':'')));
  else L.push('（目前沒有待問的問題）');
  L.push('');
  L.push('## 二、會談後馬上浮現的問題');
  L.push('');
  const insts = recs.filter(r=>r.instant);
  if (insts.length) insts.forEach(r=>L.push('- '+(r.date||'')+'（'+ctx(r)+'）：'+r.instant));
  else L.push('（無）');
  L.push('');
  L.push('## 三、我覺得可以改進的部分');
  L.push('');
  const imps = [];
  recs.forEach(r=>(r.improve||[]).forEach(t=>imps.push({t, r})));
  if (imps.length) imps.forEach(x=>L.push('- '+(x.r.date||'')+'（'+(x.r.client||'')+'）：'+x.t));
  else L.push('（無）');
  L.push('');
  L.push('---');
  L.push('（本文件由「會談後快速記錄」產生；客戶一律使用代號）');
  return L.join('\n');
}
function openMentorPack(){
  if (!load().length && !loadQ().some(x=>!x.answered)) { toast('還沒有可打包的內容'); return; }
  _mentorPack = buildMentorPack();
  openModal(`
<h2>導師督導包</h2>
<div class="lp-sub">已彙整：待問問題、會談後浮現的問題、待改進（去識別化）</div>
<div class="lp-note"><b>寄出前請掃一眼：</b>確認內文沒有不小心寫進客戶真名或可辨識細節（工具只存代號，但自由文字欄位以你輸入的為準）。</div>
<pre class="mentor-pre">${esc(_mentorPack)}</pre>
<button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="copyMentorPack()">一鍵複製整篇文字</button>`);
}
function copyMentorPack(){ if (_mentorPack) copyText(_mentorPack, '督導包已複製，貼給導師吧'); }
